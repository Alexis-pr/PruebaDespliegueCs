name: pipeline prueba-despligue-cs

on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: read

env:
  IMAGE_NAME: ghcr.io/alexis-pr/prueba-despliegue-cs:latest
  CONTAINER_NAME: prueba-despliegue-cs

jobs:

  build-and-push:

    runs-on: ubuntu-latest
    environment: production

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -f Dockerfile -t $IMAGE_NAME .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME

  deploy:

    needs: build-and-push

    runs-on: ubuntu-latest
    environment: production

    steps:

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: 157.180.40.190
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: 22

          script: |

            echo "Conexión exitosa al VPS"

            echo "${{ secrets.TOKEN }}" | docker login ghcr.io -u "yonathanprdev" --password-stdin

            docker pull ghcr.io/alexis-pr/prueba-despliegue-cs:latest

            docker stop prueba-despliegue-cs || true

            docker rm prueba-despliegue-cs || true

            docker run -d \
              --name prueba-despliegue-cs \
              -p 8083:8080 \
              ghcr.io/alexis-pr/prueba-despliegue-cs:latest
